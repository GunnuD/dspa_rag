<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VML Chat</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [file, setFile] = useState(null);
            const [isListening, setIsListening] = useState(false);
            const [selectedLang, setSelectedLang] = useState('en-US');
            const scrollRef = useRef(null);
            const fileInputRef = useRef(null);
            const recognitionRef = useRef(null);

            const languages = [
                { code: 'en-US', name: 'English' },
                { code: 'hi-IN', name: 'Hindi (हिंदी)' },
                { code: 'es-ES', name: 'Spanish (Español)' },
                { code: 'fr-FR', name: 'French (Français)' },
                { code: 'de-DE', name: 'German (Deutsch)' }
            ];

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.lang = selectedLang;
                    recognitionRef.current.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        setInput(transcript);
                        setIsListening(false);
                    };
                    recognitionRef.current.onend = () => setIsListening(false);
                }
            }, [selectedLang]);

            const toggleListening = () => {
                if (isListening) {
                    recognitionRef.current?.stop();
                } else {
                    recognitionRef.current.lang = selectedLang;
                    recognitionRef.current?.start();
                    setIsListening(true);
                }
            };

            const speak = (text) => {
                const synth = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Force the language code for the synthesizer
                // Maps the UI language code to a simplified BCP 47 code for better compatibility
                const langMap = {
                    'en-US': 'en-US',
                    'hi-IN': 'hi-IN',
                    'es-ES': 'es-ES',
                    'fr-FR': 'fr-FR',
                    'de-DE': 'de-DE'
                };
                
                utterance.lang = langMap[selectedLang] || selectedLang;
                
                // Find a matching voice for the selected language
                const voices = synth.getVoices();
                const matchedVoice = voices.find(v => v.lang.startsWith(utterance.lang.split('-')[0]));
                if (matchedVoice) {
                    utterance.voice = matchedVoice;
                }
                
                synth.speak(utterance);
            };

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim() && !file) return;

                const userMsg = { text: input + (file ? ` [File: ${file.name}]` : ''), sender: 'user' };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                const currentFile = file;
                setFile(null);
                setLoading(true);

                try {
                    const formData = new FormData();
                    formData.append('message', input);
                    if (currentFile) {
                        formData.append('file', currentFile);
                    }

                    const response = await fetch('http://localhost:8000/chat', {
                        method: 'POST',
                        body: formData,
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { 
                        text: data.response, 
                        sender: 'bot', 
                        id: data.message_id, 
                        feedback: null 
                    }]);
                    speak(data.response);
                } catch (error) {
                    setMessages(prev => [...prev, { text: 'Error: Could not connect to backend.', sender: 'bot' }]);
                } finally {
                    setLoading(false);
                }
            };

            const handleFeedback = async (msgId, rating) => {
                try {
                    await fetch('http://localhost:8000/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message_id: msgId, rating: rating }),
                    });
                    setMessages(prev => prev.map(m => m.id === msgId ? { ...m, feedback: rating } : m));
                } catch (error) {
                    console.error('Feedback error:', error);
                }
            };

            return (
                <div class="flex flex-col h-screen max-w-2xl mx-auto p-4">
                    <header class="text-2xl font-bold mb-4 text-center text-blue-600">Welcome to VML Enterprises Technology</header>
                    <div ref={scrollRef} class="flex-1 overflow-y-auto bg-white rounded-lg shadow-md p-4 mb-4">
                        {messages.map((msg, i) => (
                            <div key={i} class={`mb-4 ${msg.sender === 'user' ? 'text-right' : 'text-left'}`}>
                                <div class="inline-block relative group">
                                    <span 
                                        class={`inline-block p-3 rounded-lg ${msg.sender === 'user' ? 'bg-blue-500 text-white' : 'bg-gray-200 text-black'}`}
                                        dangerouslySetInnerHTML={{ 
                                            __html: msg.text.replace(
                                                /(https?:\/\/[^\s]+)/g, 
                                                '<a href="$1" target="_blank" class="text-blue-600 underline font-bold hover:text-blue-800">$1</a>'
                                            ) 
                                        }}
                                    >
                                    </span>
                                    {msg.sender === 'bot' && msg.id && (
                                        <div class="flex gap-2 mt-1 px-1">
                                            <button 
                                                onClick={() => handleFeedback(msg.id, 1)}
                                                class={`text-xs hover:text-blue-600 transition ${msg.feedback === 1 ? 'text-blue-600 font-bold' : 'text-gray-400'}`}
                                            >
                                                <i class="fas fa-thumbs-up"></i>
                                            </button>
                                            <button 
                                                onClick={() => handleFeedback(msg.id, -1)}
                                                class={`text-xs hover:text-red-600 transition ${msg.feedback === -1 ? 'text-red-600 font-bold' : 'text-gray-400'}`}
                                            >
                                                <i class="fas fa-thumbs-down"></i>
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                        {loading && <div class="text-gray-500 italic">Thinking...</div>}
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex gap-2 items-center mb-2">
                            <label class="text-sm text-gray-600 font-medium">Language:</label>
                            <select 
                                value={selectedLang} 
                                onChange={(e) => setSelectedLang(e.target.value)}
                                class="text-sm border rounded px-2 py-1 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                {languages.map(lang => (
                                    <option key={lang.code} value={lang.code}>{lang.name}</option>
                                ))}
                            </select>
                        </div>
                        {file && (
                            <div class="flex items-center gap-2 bg-blue-50 p-2 rounded-lg text-sm text-blue-700">
                                <i class="fas fa-file"></i>
                                <span class="flex-1 truncate">{file.name}</span>
                                <button onClick={() => setFile(null)} class="text-blue-500 hover:text-blue-700">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        )}
                        <div class="flex gap-2">
                            <button 
                                onClick={toggleListening}
                                class={`px-4 py-2 rounded-lg transition ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-200 text-gray-700'}`}
                            >
                                <i class={`fas ${isListening ? 'fa-microphone-slash' : 'fa-microphone'}`}></i>
                            </button>
                            <input 
                                type="file"
                                ref={fileInputRef}
                                onChange={(e) => setFile(e.target.files[0])}
                                style={{ display: 'none' }}
                                accept=".pdf,.txt,.md"
                            />
                            <button 
                                onClick={() => fileInputRef.current.click()}
                                class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition"
                                title="Attach File"
                            >
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <input 
                                type="text" 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Type your message..."
                            />
                            <button 
                                onClick={handleSend}
                                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition"
                                disabled={loading}
                            >
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
