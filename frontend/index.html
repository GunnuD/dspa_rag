<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VML Chat</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;

                const userMsg = { text: input, sender: 'user' };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch('http://localhost:8000/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: input }),
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { text: data.response, sender: 'bot' }]);
                } catch (error) {
                    setMessages(prev => [...prev, { text: 'Error: Could not connect to backend.', sender: 'bot' }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="flex flex-col h-screen max-w-2xl mx-auto p-4">
                    <header class="text-2xl font-bold mb-4 text-center text-blue-600">Welcome to VML Enterprises Technology</header>
                    <div ref={scrollRef} class="flex-1 overflow-y-auto bg-white rounded-lg shadow-md p-4 mb-4">
                        {messages.map((msg, i) => (
                            <div key={i} class={`mb-4 ${msg.sender === 'user' ? 'text-right' : 'text-left'}`}>
                                <span class={`inline-block p-3 rounded-lg ${msg.sender === 'user' ? 'bg-blue-500 text-white' : 'bg-gray-200 text-black'}`}>
                                    {msg.text}
                                </span>
                            </div>
                        ))}
                        {loading && <div class="text-gray-500 italic">Thinking...</div>}
                    </div>
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                            class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Type your message..."
                        />
                        <button 
                            onClick={handleSend}
                            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition"
                            disabled={loading}
                        >
                            Send
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
