name: Build Android App
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ?? Checkout
        uses: actions/checkout@v4

      - name: ?? Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ?? Install dependencies
        working-directory: ./mobile_app
        run: npm install

      - name: ?? Build APK
        working-directory: ./mobile_app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Use local eas-cli and specifically avoid credential generation issues
          # Since the project is created, we use --no-wait to just trigger the build
          # The key is to ensure EAS uses its managed credentials
          npx eas-cli build --platform android --profile preview --non-interactive --no-wait
